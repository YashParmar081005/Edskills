# Render Blueprint — free hosting for the EdSkill.ai Express + Socket.io API.
# Deploy: push this repo to GitHub, then in Render → "New → Blueprint" and pick it.
# Secrets (sync:false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: edskills-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ACCESS_TOKEN_EXPIRES
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES
        value: 7d
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: STRIPE_CURRENCY
        value: usd
      - key: INSFORGE_BASE_URL
        value: https://dr8zjaeq.us-east.insforge.app
      # Strong secrets auto-generated by Render:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Set these in the Render dashboard (Environment tab):
      - key: CLIENT_URL          # your live frontend URL (the Vercel/InsForge deploy)
        sync: false
      - key: MONGO_URI
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: INSFORGE_API_KEY
        sync: false
